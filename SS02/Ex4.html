<body>
    <script>
        //Sử dụng hàm được cung cấp sẵn để kiểm tra xem giá trị có tồn tại trong mảng hay không.
        //Trả về kết quả kiểm tra.
        function checkElement(arr, value) {
            const result = arr.includes(value);
            if (result) {
                console.log(`true`);
            } else {
                console.log(`false`);
            }
            return result;

        }
        checkElement([1, 2, 3, 4, 5], 3)
        checkElement([1, 2, 3, 4, 5], 6)
    </script>
