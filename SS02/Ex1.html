<!DOCTYPE html>

<body>
    <script>
        //Viết một hàm có tên sum nhận vào một mảng số nguyên và trả về tổng của tất cả các số chẵn trong mảng.
        let arr = [1, 2, 3, 4, 5, 6];
        function sum(arr) {
            let total = 0;
            for (let i of arr) {
                if (arr[i] % 2 === 0) {
                    total += arr[i];
                }
            }
            return total;
        }
        console.log(sum(arr));
    </script>
</body>
