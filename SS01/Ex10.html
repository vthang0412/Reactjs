<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function chuoiKyTuGiongNhau(arr){
            const chuoi = [];
            for(let str of arr){
                let key = str.split('').sort().join('');
                if(!chuoi[key]){
                    chuoi[key] = [];
                }
                chuoi[key].push(str);
            }
            return chuoi;
        }
        const input = ["eat", "tea", "tan", "ate", "nat", "bat"];
        console.log(chuoiKyTuGiongNhau(input));
    </script>
</body>
</html>
