<!DOCTYPE html>
<html lang="en">

</head>
<body>
    <script>
        function sumArr(...array){
            const result = array.map((arr) => { 
                return arr.reduce((acc, curr) => acc + curr, 0);
            });
            return result;
        }
        let printResult = sumArr([1,2],[6,7,8],[12,8]);
        console.log(printResult);
    </script>
</body>
</html>
