<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>
    <script>
        const students = [
            { id: 1, name: "Nguyễn A" },

            { id: 2, name: "Trần B" }

        ]
        function getStudent() {
            return students.forEach(student => {
                console.log(`Xin chao ${student.name}! Mã số: ${student.id}`);
            });
        }
        getStudent();
    </script>
</body>
